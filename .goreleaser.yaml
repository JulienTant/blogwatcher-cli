version: 2

project_name: blogwatcher-cli

builds:
  - id: blogwatcher-cli
    main: ./cmd/blogwatcher-cli
    binary: blogwatcher-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/JulienTant/blogwatcher-cli/internal/version.Version={{.Version}}

archives:
  - id: blogwatcher-cli
    ids:
      - blogwatcher-cli
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
  disable: true

release:
  header: |
    See [release notes](https://github.com/JulienTant/blogwatcher-cli/blob/main/docs/release-notes/{{ .Tag }}.md) for details.

snapshot:
  version_template: "main"

dockers_v2:
  - ids:
      - blogwatcher-cli
    images:
      - "ghcr.io/julientant/blogwatcher-cli"
    tags:
      - "{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    flags:
      - "--target=release"
