version: 2

project_name: blogwatcher-cli

builds:
  - id: blogwatcher-cli
    main: ./cmd/blogwatcher-cli
    binary: blogwatcher-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/JulienTant/blogwatcher-cli/internal/version.Version={{.Version}}

archives:
  - id: blogwatcher-cli
    builds:
      - blogwatcher-cli
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

dockers:
  - image_templates:
      - "ghcr.io/julientant/blogwatcher-cli:{{ .Version }}-amd64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64
  - image_templates:
      - "ghcr.io/julientant/blogwatcher-cli:{{ .Version }}-arm64"
    use: buildx
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/julientant/blogwatcher-cli:{{ .Version }}"
    image_templates:
      - "ghcr.io/julientant/blogwatcher-cli:{{ .Version }}-amd64"
      - "ghcr.io/julientant/blogwatcher-cli:{{ .Version }}-arm64"
  - name_template: "ghcr.io/julientant/blogwatcher-cli:latest"
    image_templates:
      - "ghcr.io/julientant/blogwatcher-cli:{{ .Version }}-amd64"
      - "ghcr.io/julientant/blogwatcher-cli:{{ .Version }}-arm64"
